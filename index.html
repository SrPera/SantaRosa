<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Santa Rosa 3D – Barrio Interactivo</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Three.js core -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- OrbitControls via CDN (r128 compatible) -->
  <script>
    // We will load OrbitControls inline since CDN path can vary for r128
  </script>
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════
       LOADING SCREEN – shown while OSM data is being fetched
  ══════════════════════════════════════════════════════════════ -->
  <div id="loading-screen">
    <div class="loader-inner">
      <div class="loader-ring"></div>
      <p class="loader-label">Cargando Santa Rosa<span class="dots">...</span></p>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       THREE.JS CANVAS – full-screen 3D viewport
  ══════════════════════════════════════════════════════════════ -->
  <canvas id="three-canvas"></canvas>

  <!-- ═══════════════════════════════════════════════════════════
       UI OVERLAY – buttons and info panel
  ══════════════════════════════════════════════════════════════ -->
  <div id="ui-overlay">

    <!-- Top-left branding -->
    <div id="brand">
      <span class="brand-dot"></span>
      <span class="brand-name">Santa Rosa · Cali</span>
    </div>

    <!-- Control buttons -->
    <div id="controls">
      <button id="btn-tour" class="ui-btn primary" title="Iniciar recorrido guiado">
        ▶ Iniciar recorrido
      </button>
      <button id="btn-reset" class="ui-btn secondary" title="Restablecer vista">
        ↺ Vista inicial
      </button>
    </div>

    <!-- Time-of-day indicator -->
    <div id="time-display">
      <span id="time-icon">☀</span>
      <span id="time-label">10:00 am</span>
    </div>

    <!-- Hotspot info panel (appears on click) -->
    <div id="info-panel" class="hidden">
      <button id="info-close">✕</button>
      <div id="info-icon-wrap"><span id="info-icon"></span></div>
      <h2 id="info-title"></h2>
      <p id="info-desc"></p>
      <button id="info-nav" class="ui-btn primary small">Ver en sitio web →</button>
    </div>

    <!-- Guided tour progress -->
    <div id="tour-progress" class="hidden">
      <span id="tour-label">Recorrido</span>
      <div id="tour-dots"></div>
      <button id="btn-stop-tour" class="ui-btn secondary small">Detener</button>
    </div>

  </div>

  <!-- Tooltip that follows the cursor over hotspots -->
  <div id="tooltip" class="hidden"></div>

  <script src="script.js"></script>
</body>
</html>
